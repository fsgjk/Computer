<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>上海外服门诊部电脑台账系统</title>
<style>
/* ===== Design System: CSS Variables ===== */
:root {
  --primary-50: #E6F1FB; --primary-100: #B5D4F4; --primary-400: #378ADD; --primary-600: #185FA5; --primary-800: #0C447C; --primary-900: #042C53;
  --success-50: #EAF3DE; --success-400: #97C459; --success-600: #3B6D11;
  --warning-50: #FAEEDA; --warning-400: #EF9F27; --warning-600: #854F0B;
  --danger-50: #FCEBEB; --danger-400: #E24B4A; --danger-600: #A32D2D;
  --neutral-50: #F1EFE8; --neutral-100: #D3D1C7; --neutral-200: #B4B2A9; --neutral-400: #888780; --neutral-600: #5F5E5A; --neutral-800: #444441; --neutral-900: #2C2C2A;
  --font-sans: "Inter",system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  --font-mono: "JetBrains Mono","SF Mono","Fira Code",monospace;
  --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px; --space-6: 24px; --space-8: 32px; --space-12: 48px;
  --radius-sm: 6px; --radius-md: 8px; --radius-lg: 12px; --radius-full: 999px;
}

/* ===== Reset & Base ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);font-size:13px;font-weight:400;line-height:1.6;color:var(--neutral-800);background:var(--neutral-50);min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:var(--primary-400);text-decoration:none}
a:hover{color:var(--primary-600)}

/* ===== Login ===== */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--primary-900)}
.login-box{background:#fff;border-radius:var(--radius-lg);padding:40px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.login-box h2{text-align:center;margin-bottom:4px;font-size:18px;font-weight:500;color:var(--neutral-900);line-height:1.4}
.login-box .sub{text-align:center;color:var(--neutral-400);font-size:11px;margin-bottom:24px}
.login-box .field{margin-bottom:var(--space-4)}
.login-box .field label{display:block;font-size:13px;font-weight:500;margin-bottom:var(--space-1);color:var(--neutral-800)}
.login-box .field input{width:100%;height:36px;border:0.5px solid var(--neutral-100);border-radius:var(--radius-md);padding:0 var(--space-3);font-size:13px;font-family:var(--font-sans);outline:none;transition:border-color .15s ease}
.login-box .field input:focus{border-color:var(--primary-400);box-shadow:0 0 0 3px rgba(55,138,221,.15)}
.login-box .btn-login{width:100%;height:44px;background:var(--primary-400);color:#fff;border:none;border-radius:var(--radius-md);font-size:15px;font-weight:500;cursor:pointer;transition:background .15s ease,transform .15s ease}
.login-box .btn-login:hover{background:var(--primary-600);transform:translateY(-1px)}
.login-box .error{color:var(--danger-400);font-size:11px;text-align:center;margin-top:var(--space-2);min-height:18px}

/* ===== App Layout ===== */
.app-wrap{display:none;min-height:100vh}

/* ===== Header ===== */
.header{background:linear-gradient(135deg,var(--primary-900),var(--primary-600));color:#fff;padding:0 var(--space-6);display:flex;align-items:center;height:52px;box-shadow:0 2px 8px rgba(0,0,0,.12);position:sticky;top:0;z-index:50}
.header h1{font-size:16px;font-weight:500;white-space:nowrap}
.header-spacer{flex:1}
.header-user{display:flex;align-items:center;gap:var(--space-2);font-size:13px;font-weight:400}
.header-user .user-avatar{width:28px;height:28px;border-radius:var(--radius-full);background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500}
.header-user .user-role{font-size:10px;opacity:.7}
.btn-logout{background:rgba(255,255,255,.12);color:#fff;border:0.5px solid rgba(255,255,255,.2);padding:5px 12px;border-radius:var(--radius-sm);cursor:pointer;font-size:12px;font-family:var(--font-sans);transition:background .15s ease;margin-left:var(--space-2)}
.btn-logout:hover{background:rgba(255,255,255,.2)}

/* ===== Toolbar ===== */
.toolbar-wrap{background:#fff;border:0.5px solid var(--neutral-100);border-radius:var(--radius-lg);padding:var(--space-3) var(--space-4);margin-bottom:var(--space-4);display:flex;flex-wrap:wrap;gap:var(--space-2);align-items:center}
.toolbar-wrap .search-box{position:relative;flex:1;min-width:200px;max-width:320px}
.toolbar-wrap .search-box input{width:100%;height:36px;border:0.5px solid var(--neutral-100);border-radius:var(--radius-md);padding:0 var(--space-3) 0 34px;font-size:13px;font-family:var(--font-sans);outline:none;transition:border-color .15s ease;background:var(--neutral-50)}
.toolbar-wrap .search-box input:focus{border-color:var(--primary-400);box-shadow:0 0 0 3px rgba(55,138,221,.15);background:#fff}
.toolbar-wrap .search-box .search-icon{position:absolute;left:var(--space-3);top:50%;transform:translateY(-50%);color:var(--neutral-400);font-size:14px;pointer-events:none}
.toolbar-wrap select{height:36px;border:0.5px solid var(--neutral-100);border-radius:var(--radius-md);padding:0 var(--space-3);font-size:13px;font-family:var(--font-sans);outline:none;background:#fff;cursor:pointer;transition:border-color .15s ease;min-width:110px}
.toolbar-wrap select:focus{border-color:var(--primary-400);box-shadow:0 0 0 3px rgba(55,138,221,.15)}
.content-area{padding:var(--space-6);max-width:1500px;margin:0 auto}

/* ===== Metric Cards ===== */
.metrics-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:var(--space-3);margin-bottom:var(--space-4)}
.metric-card{background:#fff;border:0.5px solid var(--neutral-100);border-radius:var(--radius-lg);padding:var(--space-4) 20px;cursor:pointer;transition:transform .3s ease,border-color .15s ease;position:relative;overflow:hidden}
.metric-card:hover{transform:translateY(-1px);border-color:var(--neutral-200)}
.metric-card .metric-label{font-size:11px;font-weight:400;color:var(--neutral-400);display:flex;align-items:center;gap:var(--space-2);margin-bottom:var(--space-1)}
.metric-card .metric-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.metric-card .metric-dot.blue{background:var(--primary-400)}
.metric-card .metric-dot.green{background:var(--success-400)}
.metric-card .metric-dot.amber{background:var(--warning-400)}
.metric-card .metric-dot.red{background:var(--danger-400)}
.metric-card .metric-dot.slate{background:var(--neutral-400)}
.metric-card .metric-dot.cyan{background:var(--primary-100)}
.metric-card .metric-value{font-size:24px;font-weight:500;font-family:var(--font-mono);color:var(--neutral-900);line-height:1.2}
.metric-card .metric-unit{font-size:13px;font-weight:400;font-family:var(--font-sans);color:var(--neutral-400);margin-left:2px}
.metric-card .metric-sub{font-size:11px;font-weight:400;color:var(--neutral-400);margin-top:var(--space-1)}
.metric-card .metric-sub .up{color:var(--success-600)}
.metric-card .metric-sub .down{color:var(--danger-600)}

/* ===== Section Cards ===== */
.section-card{background:#fff;border:0.5px solid var(--neutral-100);border-radius:var(--radius-lg);margin-bottom:var(--space-4);overflow:hidden}
.section-card .section-header{padding:var(--space-4) 20px;border-bottom:0.5px solid var(--neutral-100);display:flex;align-items:center;justify-content:space-between}
.section-card .section-header h2{font-size:15px;font-weight:500;color:var(--neutral-900);line-height:1.5}
.section-card .section-header .section-actions{display:flex;gap:var(--space-2);align-items:center}
.section-card .section-body{padding:20px}

/* ===== Dept Tags Grid ===== */
.dept-tags-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:var(--space-2)}
.dept-tag-card{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-3);border:0.5px solid var(--neutral-100);border-radius:var(--radius-md);cursor:pointer;transition:border-color .15s ease,transform .3s ease;background:#fff}
.dept-tag-card:hover{transform:translateY(-1px);border-color:var(--neutral-200)}
.dept-tag-card .dept-color-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dept-tag-card .dept-name{font-size:13px;font-weight:400;color:var(--neutral-800);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dept-tag-card .dept-count{font-size:15px;font-weight:500;font-family:var(--font-mono);color:var(--neutral-900)}

/* ===== Buttons ===== */
.btn{display:inline-flex;align-items:center;gap:var(--space-1);font-family:var(--font-sans);cursor:pointer;border:none;transition:background .15s ease,transform .15s ease,border-color .15s ease;white-space:nowrap;font-weight:500}
.btn:focus-visible{outline:2px solid var(--primary-400);outline-offset:2px}
.btn-primary{background:var(--primary-400);color:#fff;border-radius:var(--radius-md);padding:8px var(--space-4);font-size:13px;height:36px}
.btn-primary:hover{background:var(--primary-600);transform:translateY(-1px)}
.btn-secondary{background:#fff;color:var(--neutral-800);border:0.5px solid var(--neutral-200);border-radius:var(--radius-md);padding:8px var(--space-4);font-size:13px;height:36px}
.btn-secondary:hover{background:var(--neutral-50);border-color:var(--neutral-400)}
.btn-success{background:var(--success-600);color:#fff;border-radius:var(--radius-md);padding:8px var(--space-4);font-size:13px;height:36px}
.btn-success:hover{opacity:.9;transform:translateY(-1px)}
.btn-danger{background:var(--danger-400);color:#fff;border-radius:var(--radius-md);padding:8px var(--space-4);font-size:13px;height:36px}
.btn-danger:hover{opacity:.9;transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--neutral-600);border:0.5px solid var(--neutral-100);border-radius:var(--radius-md);padding:8px var(--space-4);font-size:13px;height:36px}
.btn-ghost:hover{background:var(--neutral-50);border-color:var(--neutral-200)}
.btn-sm{padding:4px var(--space-3);font-size:12px;height:28px;border-radius:var(--radius-sm)}
.btn-icon{width:28px;height:28px;border-radius:var(--radius-sm);border:0.5px solid var(--neutral-100);background:#fff;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;transition:border-color .15s ease}
.btn-icon:hover{border-color:var(--neutral-200);background:var(--neutral-50)}
.btn-icon.danger{color:var(--danger-400)}
.btn-icon.danger:hover{background:var(--danger-50);border-color:var(--danger-400)}

/* ===== Table ===== */
.table-wrapper{overflow-x:auto}
.table-wrapper table{width:100%;border-collapse:collapse;table-layout:auto;font-size:13px}
.table-wrapper thead{position:sticky;top:0;z-index:5}
.table-wrapper th{background:var(--neutral-50);color:var(--neutral-400);font-size:11px;font-weight:500;padding:var(--space-2) var(--space-3);text-align:left;border-bottom:0.5px solid var(--neutral-100);white-space:nowrap;cursor:pointer;user-select:none;transition:color .15s ease}
.table-wrapper th:hover{color:var(--neutral-600)}
.table-wrapper td{padding:var(--space-2) var(--space-3);border-bottom:0.5px solid var(--neutral-50);color:var(--neutral-800);font-size:13px;font-weight:400;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.table-wrapper td.note-cell{max-width:80px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.table-wrapper tr:hover td{background:var(--neutral-50)}

/* ===== Status Badges ===== */
.status-badge{display:inline-flex;align-items:center;padding:2px var(--space-2);border-radius:var(--radius-full);font-size:11px;font-weight:400;white-space:nowrap;line-height:1.5}
.status-badge.active{background:var(--success-50);color:var(--success-600)}
.status-badge.repair{background:var(--warning-50);color:var(--warning-600)}
.status-badge.idle{background:var(--primary-50);color:var(--primary-600)}
.status-badge.scrapped{background:var(--danger-50);color:var(--danger-600)}
.status-badge.pending{background:var(--neutral-50);color:var(--neutral-600)}

/* ===== Dept Tag (inline) ===== */
.dept-tag{display:inline-flex;align-items:center;padding:2px var(--space-2);border-radius:var(--radius-sm);font-size:11px;font-weight:400;background:var(--neutral-50);color:var(--neutral-600);border:0.5px solid var(--neutral-100);white-space:nowrap}

/* ===== Category Badge ===== */
.cat-badge{display:inline-flex;align-items:center;padding:2px var(--space-2);border-radius:var(--radius-full);font-size:11px;font-weight:400;white-space:nowrap}
.cat-badge.desktop{background:var(--primary-50);color:var(--primary-600)}
.cat-badge.laptop{background:var(--success-50);color:var(--success-600)}
.cat-badge.aio{background:var(--warning-50);color:var(--warning-600)}
.cat-badge.surface{background:var(--neutral-50);color:var(--neutral-600)}

/* ===== Pagination ===== */
.pagination{display:flex;justify-content:space-between;align-items:center;padding:var(--space-3) 20px;border-top:0.5px solid var(--neutral-100)}
.pagination-info{font-size:11px;color:var(--neutral-400)}
.pagination-info strong{color:var(--neutral-600);font-weight:500}
.pagination-btns{display:flex;gap:var(--space-1)}
.pagination-btns button{min-width:30px;height:30px;border:0.5px solid var(--neutral-100);border-radius:var(--radius-sm);background:#fff;cursor:pointer;font-size:12px;color:var(--neutral-600);font-family:var(--font-sans);transition:border-color .15s ease,background .15s ease}
.pagination-btns button:hover:not(:disabled){background:var(--neutral-50);border-color:var(--neutral-200)}
.pagination-btns button:disabled{opacity:.4;cursor:default}
.pagination-btns button.active{background:var(--primary-400);color:#fff;border-color:var(--primary-400)}
.pagination select{height:28px;border:0.5px solid var(--neutral-100);border-radius:var(--radius-sm);font-size:11px;padding:0 var(--space-1);font-family:var(--font-sans);outline:none;cursor:pointer}

/* ===== Modal ===== */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:var(--radius-lg);width:90%;max-width:700px;max-height:85vh;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.15);display:flex;flex-direction:column}
.modal-header{padding:var(--space-4) 20px;border-bottom:0.5px solid var(--neutral-100);display:flex;justify-content:space-between;align-items:center}
.modal-header h3{font-size:15px;font-weight:500;color:var(--neutral-900)}
.modal-close{width:28px;height:28px;border-radius:var(--radius-sm);border:none;background:none;font-size:18px;cursor:pointer;color:var(--neutral-400);display:flex;align-items:center;justify-content:center;transition:background .15s ease}
.modal-close:hover{background:var(--neutral-50);color:var(--neutral-600)}
.modal-body{flex:1;overflow-y:auto;padding:20px}
.modal-footer{padding:var(--space-3) 20px;border-top:0.5px solid var(--neutral-100);display:flex;justify-content:flex-end;gap:var(--space-2)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3)}
.form-group{display:flex;flex-direction:column;gap:var(--space-1)}
.form-group.full{grid-column:1/-1}
.form-group label{font-size:12px;font-weight:500;color:var(--neutral-600)}
.form-group input,.form-group select,.form-group textarea{height:36px;border:0.5px solid var(--neutral-100);border-radius:var(--radius-md);padding:0 var(--space-2);font-size:13px;font-family:var(--font-sans);outline:none;transition:border-color .15s ease}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary-400);box-shadow:0 0 0 3px rgba(55,138,221,.15)}
.form-group textarea{height:55px;padding:var(--space-2);resize:vertical}

/* ===== Confirm Dialog ===== */
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:250;align-items:center;justify-content:center}
.confirm-overlay.active{display:flex}
.confirm-box{background:#fff;border-radius:var(--radius-lg);padding:var(--space-6);width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.confirm-box p{font-size:14px;margin-bottom:var(--space-4);color:var(--neutral-800)}
.confirm-box .btn-group{display:flex;gap:var(--space-2);justify-content:center}

/* ===== Toast ===== */
.toast{position:fixed;top:var(--space-4);right:var(--space-4);z-index:300;padding:10px 18px;border-radius:var(--radius-md);color:#fff;font-size:13px;font-weight:500;animation:slideIn .3s ease;box-shadow:0 4px 12px rgba(0,0,0,.12)}
.toast.success{background:var(--success-600)}.toast.error{background:var(--danger-400)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* ===== Operation Log ===== */
.log-panel{background:#fff;border:0.5px solid var(--neutral-100);border-radius:var(--radius-lg);margin-bottom:var(--space-4);overflow:hidden;display:none}
.log-panel .log-header{padding:var(--space-3) 20px;border-bottom:0.5px solid var(--neutral-100);display:flex;justify-content:space-between;align-items:center}
.log-panel .log-header h3{font-size:13px;font-weight:500;color:var(--neutral-800)}
.log-list{max-height:140px;overflow-y:auto;font-size:11px;color:var(--neutral-400);padding:var(--space-2) 20px}
.log-list .log-item{padding:var(--space-1) 0;border-bottom:0.5px solid var(--neutral-50);display:flex;gap:var(--space-2);align-items:baseline}
.log-list .log-item .log-time{color:var(--neutral-400);flex-shrink:0}
.log-list .log-item .log-user{color:var(--neutral-600);font-weight:500;flex-shrink:0}
.log-list .log-item .log-ip{color:var(--neutral-400);font-size:10px;flex-shrink:0}

/* ===== Misc ===== */
.mono{font-family:var(--font-mono)}
.text-danger{color:var(--danger-400)}
.text-warning{color:var(--warning-400)}
.font-bold{font-weight:500}

/* ===== Year highlight ===== */
.years-old{color:var(--danger-400);font-weight:500}

/* ===== Accessibility ===== */
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border-width:0}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}

/* ===== Responsive ===== */
@media(max-width:1200px){
  .metrics-row{grid-template-columns:repeat(2,1fr)}
  .dept-tags-grid{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:768px){
  .metrics-row{grid-template-columns:1fr}
  .dept-tags-grid{grid-template-columns:repeat(2,1fr)}
  .form-grid{grid-template-columns:1fr}
  .header{padding:0 var(--space-3)}
  .content-area{padding:var(--space-3)}
  .login-box{width:90%;padding:28px}
}
</style>
</head>
<body>

<!-- Login -->
<div class="login-wrap" id="loginWrap">
<div class="login-box">
<h2>上海外服门诊部电脑台账系统</h2>
<div class="sub">请登录后使用</div>
<div class="field"><label>用户名</label><input type="text" id="loginUser" placeholder="请输入用户名" autocomplete="username"></div>
<div class="field"><label>密码</label><input type="password" id="loginPass" placeholder="请输入密码" autocomplete="current-password"></div>
<button class="btn-login" onclick="doLogin()" aria-label="登录">登 录</button>
<div class="error" id="loginError" role="alert"></div>
<div id="debugInfo" style="font-size:10px;color:#888;text-align:center;margin-top:8px"></div>
</div>
</div>

<!-- App -->
<div class="app-wrap" id="appWrap">
<!-- Header -->
<header class="header">
<h1>上海外服门诊部电脑台账系统 <span style="font-size:10px;opacity:0.6">v20260723</span></h1>
<div class="header-spacer"></div>
<div class="header-user">
<span class="user-avatar" id="headerAvatar">管</span>
<span id="headerUserName">管理员</span>
<span class="user-role" id="headerUserRole"></span>
<button class="btn-logout" onclick="showLogPanel()" style="margin-right:4px">📋 日志</button>
<button class="btn-logout" onclick="doLogout()">退出</button>
</div>
</header>

<div class="content-area">
<!-- Metric Cards -->
<section class="metrics-row" id="metricsRow" aria-label="资产概览指标"></section>

<!-- Department Section -->
<section class="section-card">
<div class="section-header"><h2>部门电脑分布</h2><span style="font-size:11px;color:var(--neutral-400)">点击标签筛选</span></div>
<div class="section-body" id="deptSection"></div>
</section>

<!-- Toolbar + Table -->
<div class="toolbar-wrap">
<div class="search-box">
<span class="search-icon">🔍</span>
<input type="text" id="searchInput" placeholder="搜索资产编号、型号、使用人、科室..." oninput="debounceSearch()" aria-label="搜索电脑资产">
</div>
<select id="filterCategory" onchange="reload()" aria-label="分类筛选"><option value="">全部分类</option></select>
<select id="filterDepartment" onchange="reload()" aria-label="部门筛选"><option value="">全部部门</option></select>
<select id="filterPublic" onchange="reload()" aria-label="公用个人筛选"><option value="">公用/个人</option><option value="公用">公用</option><option value="个人">个人</option></select>
<select id="filterOS" onchange="reload()" aria-label="操作系统筛选"><option value="">全部系统</option></select>
<button class="btn btn-primary" onclick="openModal()" aria-label="新增电脑">+ 新增电脑</button>

                } else { if(callback) callback(false); }
              };
              retryXhr.onerror = function() { if(callback) callback(false); };
              retryXhr.send(JSON.stringify(payload));
            } catch(e) { if(callback) callback(false); }
          } else { if(callback) callback(false); }
        };
        getXhr.onerror = function() { if(callback) callback(false); };
        getXhr.send();
      } else {
        if(callback) callback(false);
      }
    }
  };
  xhr.onerror = function() { if(callback) callback(false); };
  xhr.send(JSON.stringify(payload));
}

// 从云端同步：先拉取最新数据，再推送本地数据
function syncFromCloud(callback) {
  if(!GH_TOKEN) { if(callback) callback(false, 'Token未配置'); return; }
  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'https://api.github.com/repos/'+GH_REPO+'/contents/data.json?ref=main&t='+Date.now(), true);
  xhr.setRequestHeader('Authorization', 'token '+GH_TOKEN);
  xhr.setRequestHeader('Accept', 'application/vnd.github.v3+json');
  xhr.timeout = 8000;
  xhr.onload = function() {
    if(xhr.status === 200) {
      try {
        var info = JSON.parse(xhr.responseText);
        DATA_SHA = info.sha;
        var remoteData = JSON.parse(atob(info.content.replace(/\s/g,'')));
        if(remoteData.length > 0 && remoteData[0]['资产编号']) {
          // 云端数据有效，合并策略：云端优先
          if(remoteData.length >= DATA.length) {
            DATA = remoteData;
            try { localStorage.setItem('ledger_data_backup', JSON.stringify(DATA)); } catch(e) {}
            updateStats();
            updateFilters();
            render();
            if(callback) callback(true, '已从云端加载 '+DATA.length+' 条数据');
          } else {
            // 本地数据更多，推送本地到云端
            syncToGitHub(function(ok) {
              if(callback) callback(ok, ok ? '已将本地 '+DATA.length+' 条推送到云端' : '推送失败');
            });
            return;
          }
        } else {
          if(callback) callback(false, '云端数据无效');
          return;
        }
      } catch(e) { if(callback) callback(false, '数据解析失败'); return; }
    } else {
      if(callback) callback(false, '请求失败('+xhr.status+')');
      return;
    }
  };
  xhr.onerror = function() { if(callback) callback(false, '网络错误'); };
  xhr.ontimeout = function() { if(callback) callback(false, '请求超时'); };
  xhr.send();
}

// 定时从GitHub拉取最新数据（多用户自动同步）
var autoSyncTimer = null;
function startAutoSync() {
  if(!GH_TOKEN) return;
  if(autoSyncTimer) clearInterval(autoSyncTimer);
  // 延迟5秒后开始第一次同步，确保页面已完全渲染
  setTimeout(function() {
    doAutoSync();
    autoSyncTimer = setInterval(doAutoSync, 30000);
  }, 5000);
}
function doAutoSync() {
  if(!GH_TOKEN) return;
  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'https://api.github.com/repos/'+GH_REPO+'/contents/data.json?ref=main&t='+Date.now(), true);
  xhr.setRequestHeader('Authorization', 'token '+GH_TOKEN);
  xhr.setRequestHeader('Accept', 'application/vnd.github.v3+json');
  xhr.timeout = 8000;
  xhr.onload = function() {
    if(xhr.status === 200) {
      try {
        var info = JSON.parse(xhr.responseText);
        var remoteData = JSON.parse(atob(info.content.replace(/\s/g,'')));
        // 严格检查：云端数据必须有效（有资产编号）且记录数不少于本地，才更新
        if(remoteData.length > 0 && remoteData[0]['资产编号'] && remoteData.length >= DATA.length && JSON.stringify(remoteData) !== JSON.stringify(DATA)) {
          DATA = remoteData;
          DATA_SHA = info.sha;
          try { localStorage.setItem('ledger_data_backup', JSON.stringify(DATA)); } catch(e) {}
          updateStats();
          updateFilters();
          render();
        }
      } catch(e) {}
    }
  };
  xhr.onerror = function() {};
  xhr.ontimeout = function() {};
  xhr.send();
}

// ===== 登录 =====
function doLogin() {
  var u = document.getElementById('loginUser').value.trim();
  var p = document.getElementById('loginPass').value;
  var err = document.getElementById('loginError');
  if(!u||!p) { err.textContent='请输入用户名和密码'; return; }
  try {
    var hash = sha256(p);
    var user = USERS[u];
    if(!user || user.pwd !== hash) { err.textContent='用户名或密码错误'; return; }
    LOGIN_USER = {username:u, name:user.name, role:user.role};
    localStorage.setItem(TOKEN_KEY, JSON.stringify({u:u, h:hash}));
    showApp(user);
  } catch(e) { err.textContent='登录出错，请重试'; }
}

function showApp(user) {
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('appWrap').style.display='block';
  document.getElementById('headerAvatar').textContent = user.name[0];
  document.getElementById('headerUserName').textContent = user.name;
  document.getElementById('headerUserRole').textContent = user.role==='admin'?'管理员':'普通用户';

  refreshLogPanel();
  startAutoSync(); // 每30秒自动检查云端更新
}

function doLogout() {

}

// ===== 统计指标卡 =====
function updateStats() {
  var d = DATA;
  var pp = {}; var depts = {}; var idle = 0; var catCounts = {};
  d.forEach(function(r) {
    var p = r['公用个人']||'未知'; pp[p] = (pp[p]||0)+1;
    var dept = r['所属部门']||'未分配';
    var mainDept = dept.split('-')[0];
    if(!mainDept) mainDept = '未分配';
    depts[mainDept] = (depts[mainDept]||0)+1;
    var pos = r['当前位置']||''; var person = r['责任人']||'';
    if(['空闲','备用','库存','闲置','未分配'].some(function(k){return pos.includes(k);}) || !person) idle++;
    var cat = r['分类']||'其他';
    if(cat==='sruface') cat='Surface';
    catCounts[cat] = (catCounts[cat]||0)+1;
  });

  var used = d.length - idle;
  var onlineRate = d.length > 0 ? Math.round(used/d.length*1000)/10 : 0;

  var html = '';
  // 4 Metric Cards (design spec)
  // 按数量排序分类
  var catList = [];
  Object.keys(catCounts).forEach(function(k){ catList.push(k+catCounts[k]); });
  var catSub = catList.join(' + ');
  html += '<div class="metric-card" onclick="filterByCard(\'clear\')"><div class="metric-label"><span class="metric-dot blue"></span>电脑总数</div><div class="metric-value">'+d.length+'<span class="metric-unit">台</span></div><div class="metric-sub">含'+catSub+'</div></div>';
  html += '<div class="metric-card" onclick="filterByCard(\'used\')"><div class="metric-label"><span class="metric-dot green"></span>使用率</div><div class="metric-value">'+onlineRate+'<span class="metric-unit">%</span></div><div class="metric-sub">已用 '+used+' 台 / 共 '+d.length+' 台</div></div>';
  html += '<div class="metric-card" onclick="filterByCard(\'idle\')"><div class="metric-label"><span class="metric-dot amber"></span>空闲电脑</div><div class="metric-value">'+idle+'<span class="metric-unit">台</span></div><div class="metric-sub">待分配或闲置设备</div></div>';
  var old5 = d.filter(function(r){return calcYears(r) > 5;}).length;
  var old10 = d.filter(function(r){return calcYears(r) > 10;}).length;
  html += '<div class="metric-card" onclick="filterByCard(\'old\')"><div class="metric-label"><span class="metric-dot red"></span>超年限电脑</div><div class="metric-value">'+old5+'<span class="metric-unit">台</span></div><div class="metric-sub">超5年 '+old5+' 台 / 超10年 '+old10+' 台</div></div>';
  document.getElementById('metricsRow').innerHTML = html;

  // 部门分布卡片 (在section-card中)
  var deptSection = document.getElementById('deptSection');
  if(deptSection) {
    var deptItems = [];
    Object.keys(depts).forEach(function(k){ if(k !== '未分配') deptItems.push({name:k, count:depts[k]}); });
    deptItems.sort(function(a,b){return b.count - a.count;});
    var deptColors = ['#378ADD','#97C459','#EF9F27','#E24B4A','#185FA5','#3B6D11','#854F0B','#0C447C'];
    deptSection.innerHTML = '<div class="dept-tags-grid">'+deptItems.map(function(di, idx){
      var color = deptColors[idx % deptColors.length];
      return '<div class="dept-tag-card" onclick="filterByCard(\'dept_'+di.name+'\')"><span class="dept-color-dot" style="background:'+color+'"></span><span class="dept-name">'+di.name+'</span><span class="dept-count">'+di.count+'</span></div>';
    }).join('')+'</div>';
  }
}

// ===== 筛选器 =====
function updateFilters() {
  var cats = []; var depts = []; var oss = [];
  DATA.forEach(function(r) { if(r['分类'] && cats.indexOf(r['分类'])<0) cats.push(r['分类']); if(r['所属部门'] && depts.indexOf(r['所属部门'])<0) depts.push(r['所属部门']); if(r['操作系统'] && oss.indexOf(r['操作系统'])<0) oss.push(r['操作系统']); });
  cats.sort(); depts.sort(); oss.sort();
  document.getElementById('filterCategory').innerHTML = '<option value="">全部分类</option>'+cats.map(function(c){return '<option value="'+c+'">'+c+'</option>';}).join('');
  document.getElementById('filterDepartment').innerHTML = '<option value="">全部部门</option>'+depts.map(function(d){return '<option value="'+d+'">'+d+'</option>';}).join('');
  document.getElementById('filterOS').innerHTML = '<option value="">全部系统</option>'+oss.map(function(o){return '<option value="'+o+'">'+o+'</option>';}).join('');
  document.getElementById('deptList').innerHTML = depts.map(function(d){return '<option value="'+d+'">';}).join('');
}

// ===== 数据过滤 =====
function getFilteredData() {
  var search = document.getElementById('searchInput').value.toLowerCase();
  var cat = document.getElementById('filterCategory').value;
  var dept = document.getElementById('filterDepartment').value;
  var ppv = document.getElementById('filterPublic').value;
  var osv = document.getElementById('filterOS').value;
  var filtered = DATA.slice();
  if(filterMode === 'idle') filtered = filtered.filter(function(r) { var pos = r['当前位置']||''; var person = r['责任人']||''; return ['空闲','备用','库存','闲置','未分配'].some(function(k){return pos.includes(k);}) || !person; });
  else if(filterMode === 'used') filtered = filtered.filter(function(r) { var pos = r['当前位置']||''; var person = r['责任人']||''; return !(['空闲','备用','库存','闲置','未分配'].some(function(k){return pos.includes(k);}) || !person); });
  else if(filterMode === 'old') filtered = filtered.filter(function(r) { return calcYears(r) > 5; });
  else if(filterMode === 'dept_prefix') filtered = filtered.filter(function(r) { var d = r['所属部门']||''; var main = d.split('-')[0]; if(!main) main = '未分配'; return main === currentDeptPrefix; });
  if(search) filtered = filtered.filter(function(r){return FIELDS.some(function(f){return String(r[f]||'').toLowerCase().includes(search);});});
  if(cat) filtered = filtered.filter(function(r){return r['分类']===cat;});
  if(dept) filtered = filtered.filter(function(r){return (r['所属部门']||'').includes(dept);});
  if(ppv) filtered = filtered.filter(function(r){return r['公用个人']===ppv;});
  if(osv) filtered = filtered.filter(function(r){return (r['操作系统']||'')===osv;});
  if(sortField) {
    filtered.sort(function(a, b) {
      var va = (a[sortField] || '').toString();
      var vb = (b[sortField] || '').toString();
      var na = parseFloat(va), nb = parseFloat(vb);
      if(!isNaN(na) && !isNaN(nb) && va === String(na) && vb === String(nb)) { return (na - nb) * sortDir; }
      return va.localeCompare(vb, 'zh-CN') * sortDir;
    });
  }
  return filtered;
}

function calcYears(r) {
  var py = r['采购日期']||'';
  if(!py || py === '/') return 0;
  var year = parseInt(py);
  if(isNaN(year)) return 0;
  return new Date().getFullYear() - year;
}

    '<option value="500"'+(pageSize===500?' selected':'')+'>500条</option>'+
    '</select></div><div class="pagination-btns">'+ph+'</div>';
}

function toggleSort(field) {
  if(sortField === field) { sortDir = -sortDir; }
  else { sortField = field; sortDir = 1; }
  currentPage = 1;
  render();
}

function changePageSize(size) { pageSize = parseInt(size); currentPage = 1; render(); }
function goPage(p) { if(p>=1 && p<=Math.ceil(getFilteredData().length/pageSize)){ currentPage=p; render(); } }
function reload() { filterMode=''; currentDeptPrefix=''; currentPage=1; render(); }
function debounceSearch() { filterMode=''; currentDeptPrefix=''; clearTimeout(searchTimer); searchTimer = setTimeout(function(){ currentPage=1; render(); }, 300); }

function filterByCard(action) {
  document.getElementById('searchInput').value = '';
  document.getElementById('filterCategory').value = '';
  document.getElementById('filterDepartment').value = '';
  document.getElementById('filterPublic').value = '';
  document.getElementById('filterOS').value = '';
  filterMode = (action === 'clear') ? '' : action;
  if(action.indexOf('dept_') === 0) {
    filterMode = '';
    var deptName = action.substring(5);
    // 按所属部门前缀精确筛选，而非搜索框模糊匹配
    // 设置一个隐藏的部门筛选标记
    document.getElementById('filterDepartment').setAttribute('data-dept-prefix', deptName);
    // 同时设置一个特殊值让 getFilteredData 识别
    filterMode = 'dept_prefix';
    currentDeptPrefix = deptName;
  }
  currentPage = 1;
  render();
}

// ===== CRUD =====
function openModal(id) {
  if(!LOGIN_USER) { showToast('请先登录', 'error'); return; }
  editingId = id || null;
  document.getElementById('modalTitle').textContent = id ? '编辑电脑 #'+id : '新增电脑';
  document.getElementById('editForm').reset();
  if(id) {
    var r = DATA.find(function(d){return d['序号']===id;});
    if(r) {
      var form = document.getElementById('editForm');
      FIELDS.forEach(function(f){ var el = form.querySelector('[name="'+f+'"]'); if(el && r[f]!==undefined) el.value = r[f]; });
    }
  }
  document.getElementById('editModal').classList.add('active');
}

function editDevice(id) { openModal(id); }
function closeModal() { document.getElementById('editModal').classList.remove('active'); }

function saveDevice() {
  var form = document.getElementById('editForm');
  var fd = new FormData(form);
  var obj = {};
  FIELDS.forEach(function(f){ obj[f] = fd.get(f) || ''; });
  if(editingId) {
    var idx = DATA.findIndex(function(d){return d['序号']===editingId;});
    if(idx >= 0) {
      var old = DATA[idx];
      // 记录变更字段
      var changes = [];
      FIELDS.forEach(function(f) {
        var ov = (old[f]||'').toString();
        var nv = (obj[f]||'').toString();
        if(ov !== nv && f !== '序号') changes.push(f + ': ' + ov + ' → ' + nv);
      });
      var merged = {}; Object.keys(DATA[idx]).forEach(function(k){merged[k]=DATA[idx][k];}); Object.keys(obj).forEach(function(k){merged[k]=obj[k];}); merged['序号']=editingId;
      DATA[idx] = merged;
      var detail = changes.length > 0 ? changes.join('; ') : '无变更';
      addOpLog('编辑', '#'+editingId+' '+(obj['资产编号']||'')+' ('+(obj['当前位置']||'')+')', detail);
    }
  } else {
    var maxId = Math.max.apply(null, [0].concat(DATA.map(function(d){return parseInt(d['序号'])||0;})));
    obj['序号'] = String(maxId + 1);
    DATA.push(obj);
    addOpLog('新增', '#'+obj['序号']+' '+(obj['资产编号']||'')+' ('+(obj['当前位置']||'')+')', obj['分类']+' - IP:'+(obj['IP地址']||'无'));
  }
  closeModal();
  updateStats();
  render();
  saveDataToStorage();
  showToast(editingId ? '电脑更新成功' : '电脑添加成功', 'success');
}

function confirmDelete(id) {
  if(!LOGIN_USER || LOGIN_USER.role !== 'admin') { showToast('仅管理员可删除', 'error'); return; }
  var del = DATA.find(function(d){return d['序号']===id;});
  document.getElementById('confirmMsg').textContent = '确认删除 #'+id+' '+(del?del['资产编号']:'')+' ('+(del?del['当前位置']:'')+')？';
  document.getElementById('confirmDialog').classList.add('active');
  confirmCb = function() {
    var del = DATA.find(function(d){return d['序号']===id;});
    DATA = DATA.filter(function(d){return d['序号']!==id;});
    addOpLog('删除', '#'+id+' '+(del?del['资产编号']:'')+' ('+(del?del['当前位置']:'')+')', 'IP:'+(del?del['IP地址']:'无')+' | '+del['分类']);
    updateStats();
    render();
    saveDataToStorage();
    showToast('已删除', 'success');
  };
}

function closeConfirm() { document.getElementById('confirmDialog').classList.remove('active'); confirmCb = null; }
function executeConfirm() { if(confirmCb){ confirmCb(); closeConfirm(); } }

// ===== 导出/导入 =====
function exportCSV() {
  var filtered = getFilteredData();
  var csv = '\uFEFF' + FIELDS.join(',') + '\n';
  filtered.forEach(function(r){
    csv += FIELDS.map(function(f){ var v = String(r[f]||''); if(v.includes(',')||v.includes('"')||v.includes('\n')) v = '"'+v.replace(/"/g,'""')+'"'; return v; }).join(',')+'\n';
  });
  var blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '电脑台账_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  addOpLog('导出', filtered.length+'条记录', '');
  showToast('导出成功', 'success');
}

function importData(input) {
  if(!LOGIN_USER) { showToast('请先登录', 'error'); return; }
  var file = input.files[0];
  if(!file) return;
  var ext = file.name.split('.').pop().toLowerCase();
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var imported;
      if(ext === 'json') { imported = JSON.parse(e.target.result); if(!Array.isArray(imported)) imported = imported.data || []; }
      else {
        var lines = e.target.result.split('\n').filter(Boolean);
        if(lines.length < 2) { showToast('文件格式错误', 'error'); return; }
        var headers = lines[0].replace(/^\uFEFF/,'').split(',');
        imported = lines.slice(1).map(function(line) {
          var vals = [], inQ = false, cur = '';
          for(var ci=0;ci<line.length;ci++) { var ch=line[ci]; if(ch==='"') inQ = !inQ; else if(ch===',' && !inQ) { vals.push(cur); cur = ''; } else cur += ch; }
          vals.push(cur);
          var obj = {}; headers.forEach(function(h,i){ obj[h.trim()] = (vals[i]||'').replace(/^"|"$/g,''); });
          return obj;
        });
      }
      if(imported.length === 0) { showToast('未识别到数据', 'error'); return; }
      document.getElementById('confirmMsg').textContent = '确认导入 '+imported.length+' 条数据？';
      document.getElementById('confirmDialog').classList.add('active');
      confirmCb = function() {
        DATA = imported;
        addOpLog('导入', imported.length+'条记录', '');
        updateStats();
        updateFilters();
        render();
        saveDataToStorage();
        showToast('已导入 '+imported.length+' 条', 'success');
      };
    } catch(err) { showToast('解析失败: '+err.message, 'error'); }
  };
  if(ext === 'json') reader.readAsText(file); else reader.readAsText(file);
  input.value = '';
}

// ===== Toast =====
function showToast(msg, type) {
  var el = document.createElement('div');
  el.className = 'toast '+type;
  el.textContent = msg;
  el.setAttribute('role', 'alert');
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(function(){ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(function(){el.remove();},300); }, 2500);
}

// Modal overlay click to close
document.getElementById('editModal').addEventListener('click', function(e){ if(e.target===this) closeModal(); });
document.getElementById('confirmDialog').addEventListener('click', function(e){ if(e.target===this) closeConfirm(); });
document.getElementById('logModal').addEventListener('click', function(e){ if(e.target===this) closeLogPanel(); });
