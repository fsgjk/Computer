*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;color:#333;min-height:100vh}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a3c5e,#1a5276,#2980b9)}
.login-box{background:#fff;border-radius:16px;padding:40px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-box h2{text-align:center;margin-bottom:6px;font-size:20px;color:#1a5276}
.login-box .sub{text-align:center;color:#666;font-size:12px;margin-bottom:24px}
.login-box .field{margin-bottom:16px}
.login-box .field label{display:block;font-size:13px;font-weight:500;margin-bottom:5px;color:#374151}
.login-box .field input{width:100%;height:40px;border:1px solid #d1d5db;border-radius:8px;padding:0 12px;font-size:14px;outline:none}
.login-box .field input:focus{border-color:#2980b9;box-shadow:0 0 0 3px rgba(41,128,185,.1)}
.login-box .btn-login{width:100%;height:42px;background:#2980b9;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:500;cursor:pointer}
.login-box .btn-login:hover{background:#1a6daa}
.login-box .error{color:#dc2626;font-size:12px;text-align:center;margin-top:8px;min-height:18px}
.app-wrap{display:none}
.header{background:linear-gradient(135deg,#1a5276,#2980b9);color:#fff;padding:10px 24px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.15);position:sticky;top:0;z-index:100}
.header h1{font-size:17px;font-weight:600}
.header-right{display:flex;align-items:center;gap:12px;font-size:13px}
.btn-logout{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px}
.btn-logout:hover{background:rgba(255,255,255,.25)}
.container{max-width:1400px;margin:0 auto;padding:16px}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:14px}
.stat-card{background:#fff;border-radius:10px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.08);display:flex;align-items:center;gap:10px;cursor:pointer;transition:transform .2s}
.stat-card:hover{transform:translateY(-2px)}
.stat-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.stat-icon.blue{background:#dbeafe;color:#2563eb}.stat-icon.green{background:#dcfce7;color:#16a34a}.stat-icon.slate{background:#f1f5f9;color:#64748b}.stat-icon.cyan{background:#cffafe;color:#0891b2}.stat-icon.red{background:#fee2e2;color:#dc2626}
.stat-value{font-size:20px;font-weight:700;line-height:1.2}
.stat-label{font-size:11px;color:#666}
.toolbar{background:#fff;border-radius:10px;padding:12px 16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.toolbar input,.toolbar select{height:34px;border:1px solid #d1d5db;border-radius:7px;padding:0 10px;font-size:13px;outline:none}
.toolbar input:focus,.toolbar select:focus{border-color:#2980b9;box-shadow:0 0 0 3px rgba(41,128,185,.1)}
.toolbar input{flex:1;min-width:160px}
.toolbar select{min-width:120px}
.btn{display:inline-flex;align-items:center;gap:4px;padding:7px 14px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .2s;white-space:nowrap}
.btn-primary{background:#2980b9;color:#fff}.btn-primary:hover{background:#1a6daa}
.btn-success{background:#16a34a;color:#fff}.btn-success:hover{background:#15803d}
.btn-danger{background:#dc2626;color:#fff}.btn-danger:hover{background:#b91c1c}
.btn-outline{background:#fff;color:#374151;border:1px solid #d1d5db}
.btn-outline:hover{background:#f9fafb}
.btn-sm{padding:4px 10px;font-size:12px}
.table-container{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden}
.table-wrapper{overflow-x:auto;max-height:60vh;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:1700px}
thead{position:sticky;top:0;z-index:10}
th{background:#f8fafc;color:#475569;font-weight:600;padding:8px 6px;text-align:left;border-bottom:2px solid #e2e8f0;white-space:nowrap;font-size:11px}
td{padding:6px;border-bottom:1px solid #f1f5f9;white-space:nowrap}
tr:hover td{background:#f0f7ff}
.badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:500}
.bg-blue{background:#dbeafe;color:#1e40af}.bg-green{background:#dcfce7;color:#166534}.bg-yellow{background:#fef3c7;color:#92400e}.bg-purple{background:#f3e8ff;color:#7c3aed}.bg-cyan{background:#e0f2fe;color:#0369a1}.bg-pink{background:#fce7f3;color:#be185d}.bg-yes{background:#dcfce7;color:#166534}.bg-no{background:#fee2e2;color:#991b1b}
.pagination{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-top:1px solid #f1f5f9}
.pagination-info{font-size:12px;color:#666}
.pagination-btns{display:flex;gap:4px}
.pagination-btns button{width:30px;height:30px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;font-size:13px}
.pagination-btns button:hover:not(:disabled){background:#f0f7ff;border-color:#2980b9}
.pagination-btns button:disabled{opacity:.4;cursor:default}
.pagination-btns button.active{background:#2980b9;color:#fff;border-color:#2980b9}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:12px;width:90%;max-width:700px;max-height:85vh;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.2);display:flex;flex-direction:column}
.modal-header{padding:14px 18px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center}
.modal-header h3{font-size:16px;font-weight:600}
.modal-close{width:28px;height:28px;border:none;background:none;font-size:18px;cursor:pointer;border-radius:6px;color:#666;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:#f3f4f6}
.modal-body{flex:1;overflow-y:auto;padding:16px}
.modal-footer{padding:12px 18px;border-top:1px solid #e5e7eb;display:flex;justify-content:flex-end;gap:8px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-group{display:flex;flex-direction:column;gap:3px}
.form-group.full{grid-column:1/-1}
.form-group label{font-size:12px;font-weight:500;color:#374151}
.form-group input,.form-group select,.form-group textarea{height:34px;border:1px solid #d1d5db;border-radius:6px;padding:0 8px;font-size:13px;outline:none}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#2980b9;box-shadow:0 0 0 3px rgba(41,128,185,.1)}
.form-group textarea{height:55px;padding:6px 8px;resize:vertical}
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:250;align-items:center;justify-content:center}
.confirm-overlay.active{display:flex}
.confirm-box{background:#fff;border-radius:12px;padding:24px;width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.confirm-box p{font-size:14px;margin-bottom:16px}
.confirm-box .btn-group{display:flex;gap:8px;justify-content:center}
.toast{position:fixed;top:16px;right:16px;z-index:300;padding:10px 18px;border-radius:8px;color:#fff;font-size:13px;font-weight:500;animation:slideIn .3s ease;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.toast.success{background:#16a34a}.toast.error{background:#dc2626}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@media(max-width:768px){.form-grid{grid-template-columns:1fr}.header{padding:10px 14px}.header h1{font-size:15px}.toolbar{flex-direction:column}.toolbar input{width:100%}.login-box{width:90%;padding:28px}}
</style>
</head>
<body>

<div class="login-wrap" id="loginWrap">
<div class="login-box">
<h2>🖥 健康管理中心电脑台账系统</h2>
<div class="sub">请登录后使用</div>
<div class="field"><label>用户名</label><input type="text" id="loginUser" placeholder="请输入用户名" autocomplete="username"></div>
<div class="field"><label>密码</label><input type="password" id="loginPass" placeholder="请输入密码" autocomplete="current-password"></div>
<button class="btn-login" onclick="doLogin()">登 录</button>
<div class="error" id="loginError"></div>
</div>
</div>

<div class="app-wrap" id="appWrap">
<div class="header">
<div><h1>🖥 健康管理中心电脑台账系统</h1></div>
<div class="header-right">
<span id="loginUserName">-</span>
<span style="font-size:11px;opacity:.7" id="loginUserRole"></span>
<button class="btn-logout" onclick="doLogout()">退出</button>
</div>
</div>

<div class="container">
<div class="stats-row" id="statsRow"></div>
<div id="logPanel" style="background:#fff;border-radius:10px;padding:10px 16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);display:none">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><strong style="font-size:13px">📝 操作日志</strong><button class="btn btn-outline btn-sm" onclick="clearLogs()">清空</button></div>
<div id="logList" style="max-height:120px;overflow-y:auto;font-size:12px;color:#666"></div>
</div>
<div class="toolbar">
<input type="text" id="searchInput" placeholder="🔍 搜索" oninput="debounceSearch()">
<select id="filterCategory" onchange="reload()"><option value="">全部分类</option></select>
<select id="filterDepartment" onchange="reload()"><option value="">全部部门</option></select>
<select id="filterPublic" onchange="reload()"><option value="">公用/个人</option><option value="公用">公用</option><option value="个人">个人</option></select>
<button class="btn btn-success" onclick="openModal()">+ 新增电脑</button>
<button class="btn btn-outline" onclick="exportCSV()">📥 导出CSV</button>
<button class="btn btn-outline" onclick="document.getElementById('importFile').click()">📤 导入数据</button>
<input type="file" id="importFile" accept=".csv,.json" style="display:none" onchange="importData(this)">
</div>
<div class="table-container">
<div class="table-wrapper" id="tableWrapper"><div style="text-align:center;padding:40px;color:#666">请先登录</div></div>
<div class="pagination" id="pagination"></div>
</div>
</div>
</div>

<div class="modal-overlay" id="editModal">
<div class="modal">
<div class="modal-header"><h3 id="modalTitle">新增电脑</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
<div class="modal-body">
<form class="form-grid" id="editForm">
<div class="form-group"><label>当前位置</label><input name="当前位置"></div>
<div class="form-group"><label>公用/个人</label><select name="公用个人"><option value="">请选择</option><option value="公用">公用</option><option value="个人">个人</option></select></div>
<div class="form-group"><label>责任人</label><input name="责任人"></div>
<div class="form-group"><label>资产编号</label><input name="资产编号"></div>
<div class="form-group"><label>用户名</label><input name="用户名"></div>
<div class="form-group"><label>MAC地址</label><input name="MAC地址"></div>
<div class="form-group"><label>是否加域</label><select name="是否加域"><option value="">请选择</option><option value="是">是</option><option value="否">否</option></select></div>
<div class="form-group"><label>IP地址</label><input name="IP地址"></div>
<div class="form-group"><label>所属部门</label><input name="所属部门" list="deptList"><datalist id="deptList"></datalist></div>
<div class="form-group"><label>采购日期</label><input name="采购日期"></div>
<div class="form-group"><label>使用年限</label><input name="使用年限"></div>
<div class="form-group"><label>本地账号</label><input name="本地账号"></div>
<div class="form-group"><label>本地密码</label><input name="本地密码"></div>
<div class="form-group"><label>分类</label><select name="分类"><option value="">请选择</option><option value="台式">台式</option><option value="笔记本">笔记本</option><option value="一体机">一体机</option><option value="sruface">Surface</option></select></div>
<div class="form-group"><label>CPU</label><input name="CPU"></div>
<div class="form-group"><label>内存</label><input name="内存"></div>
<div class="form-group"><label>硬盘</label><input name="硬盘"></div>
<div class="form-group"><label>操作系统</label><input name="操作系统"></div>
<div class="form-group full"><label>备注</label><textarea name="备注"></textarea></div>
</form>
</div>
<div class="modal-footer"><button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveDevice()">保存</button></div>
</div>
</div>

<div class="confirm-overlay" id="confirmDialog">
<div class="confirm-box"><p id="confirmMsg"></p>
<div class="btn-group"><button class="btn btn-outline" onclick="closeConfirm()">取消</button><button class="btn btn-danger" onclick="executeConfirm()">确认删除</button></div>
</div>
</div>

<div id="toastContainer"></div>

function clearLogs() { opLogs = []; localStorage.removeItem('ledger_op_logs'); refreshLogPanel(); }

function doLogin() {
  var u = document.getElementById('loginUser').value.trim();
  var p = document.getElementById('loginPass').value;
  var err = document.getElementById('loginError');
  if(!u||!p) { err.textContent='请输入用户名和密码'; return; }
  try {
    var hash = sha256(p);
    var user = USERS[u];
    if(!user || user.pwd !== hash) { err.textContent='用户名或密码错误'; return; }
    LOGIN_USER = {username:u, name:user.name, role:user.role};
    localStorage.setItem(TOKEN_KEY, JSON.stringify({u:u, h:hash}));
    showApp(user);
  } catch(e) { err.textContent='登录出错，请重试'; }
}

function showApp(user) {
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('appWrap').style.display='block';
  document.getElementById('loginUserName').textContent = user.name;
  document.getElementById('loginUserRole').textContent = user.role==='admin'?'(管理员)':'';
  updateStats();
  updateFilters();
  render();
  refreshLogPanel();
}

function doLogout() {
  LOGIN_USER = null;
  localStorage.removeItem(TOKEN_KEY);
  document.getElementById('loginWrap').style.display='flex';
  document.getElementById('appWrap').style.display='none';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginError').textContent = '';
}

document.getElementById('loginPass').addEventListener('keydown', function(e) { if(e.key==='Enter') doLogin(); });
document.getElementById('loginUser').addEventListener('keydown', function(e) { if(e.key==='Enter') doLogin(); });

(function() {
  var saved = localStorage.getItem(TOKEN_KEY);
  if(!saved) return;
  try {
    var s = JSON.parse(saved);
    var user = USERS[s.u];
    if(user && user.pwd === s.h) {
      LOGIN_USER = {username:s.u, name:user.name, role:user.role};
      showApp(user);
    }
  } catch(e) {}
})();

function updateStats() {
  var d = DATA;
  var pp = {}; var idle = 0;
  d.forEach(function(r) {
    var p = r['公用个人']||'未知'; pp[p] = (pp[p]||0)+1;
    var pos = r['当前位置']||''; var person = r['责任人']||'';
    if(['空闲','备用','库存','闲置','未分配'].some(function(k){return pos.includes(k);}) || !person) idle++;
  });
  var items = [
    {icon:'blue',label:'总电脑数',value:d.length, action:'clear'},
    {icon:'green',label:'已用电脑',value:d.length - idle, action:'used'},
    {icon:'slate',label:'空闲电脑',value:idle, action:'idle'},
    {icon:'cyan',label:'公用电脑',value:pp['公用']||0, action:'public'},
    {icon:'red',label:'个人电脑',value:pp['个人']||0, action:'personal'},
  ];
  document.getElementById('statsRow').innerHTML = items.map(function(i) {
    return '<div class="stat-card" onclick="filterByCard(\''+i.action+'\')"><div class="stat-icon '+i.icon+'">'+i.label[0]+'</div><div><div class="stat-value">'+i.value+'</div><div class="stat-label">'+i.label+'</div></div></div>';
  }).join('');
}

function updateFilters() {
  var cats = []; var depts = [];
  DATA.forEach(function(r) { if(r['分类'] && cats.indexOf(r['分类'])<0) cats.push(r['分类']); if(r['所属部门'] && depts.indexOf(r['所属部门'])<0) depts.push(r['所属部门']); });
  cats.sort(); depts.sort();
  document.getElementById('filterCategory').innerHTML = '<option value="">全部分类</option>'+cats.map(function(c){return '<option value="'+c+'">'+c+'</option>';}).join('');
  document.getElementById('filterDepartment').innerHTML = '<option value="">全部部门</option>'+depts.map(function(d){return '<option value="'+d+'">'+d+'</option>';}).join('');
  document.getElementById('deptList').innerHTML = depts.map(function(d){return '<option value="'+d+'">';}).join('');
}

function getFilteredData() {
  var search = document.getElementById('searchInput').value.toLowerCase();
  var cat = document.getElementById('filterCategory').value;
  var dept = document.getElementById('filterDepartment').value;
  var ppv = document.getElementById('filterPublic').value;
  var filtered = DATA.slice();
  if(filterMode === 'idle') filtered = filtered.filter(function(r) { var pos = r['当前位置']||''; var person = r['责任人']||''; return ['空闲','备用','库存','闲置','未分配'].some(function(k){return pos.includes(k);}) || !person; });
  else if(filterMode === 'used') filtered = filtered.filter(function(r) { var pos = r['当前位置']||''; var person = r['责任人']||''; return !(['空闲','备用','库存','闲置','未分配'].some(function(k){return pos.includes(k);}) || !person); });
  if(search) filtered = filtered.filter(function(r){return FIELDS.some(function(f){return String(r[f]||'').toLowerCase().includes(search);});});
  if(cat) filtered = filtered.filter(function(r){return r['分类']===cat;});
  if(dept) filtered = filtered.filter(function(r){return (r['所属部门']||'').includes(dept);});
  if(ppv) filtered = filtered.filter(function(r){return r['公用个人']===ppv;});
  // 排序
  if(sortField) {
    filtered.sort(function(a, b) {
      var va = (a[sortField] || '').toString();
      var vb = (b[sortField] || '').toString();
      var na = parseFloat(va), nb = parseFloat(vb);
      if(!isNaN(na) && !isNaN(nb) && va === String(na) && vb === String(nb)) { return (na - nb) * sortDir; }
      return va.localeCompare(vb, 'zh-CN') * sortDir;
    });
  }
  return filtered;
}

function render() {
  var filtered = getFilteredData();
  var total = filtered.length;
  var totalPages = Math.max(1, Math.ceil(total/pageSize));
  if(currentPage > totalPages) currentPage = totalPages;
  var start = (currentPage-1)*pageSize;
  var page = filtered.slice(start, start+pageSize);

  var catBadge = {'台式':'bg-blue','笔记本':'bg-green','一体机':'bg-yellow','sruface':'bg-purple'};
  var isAdmin = LOGIN_USER && LOGIN_USER.role === 'admin';

  function thSort(field, label) {
    var arrow = '';
    if(sortField === field) arrow = sortDir === 1 ? ' \u25b2' : ' \u25bc';
    return '<th style="cursor:pointer" onclick="toggleSort(\''+field+'\')">'+label+arrow+'</th>';
  }

  document.getElementById('tableWrapper').innerHTML = '<table><thead><tr>'+
    thSort('序号','序号')+
    thSort('当前位置','当前位置')+
    thSort('公用个人','公用/个人')+
    thSort('责任人','责任人')+
    thSort('资产编号','资产编号')+
    thSort('用户名','用户名')+
    thSort('MAC地址','MAC地址')+
    thSort('是否加域','加域')+
    thSort('IP地址','IP地址')+
    thSort('所属部门','所属部门')+
    thSort('采购日期','采购日期')+
    thSort('使用年限','使用年限')+
    thSort('本地账号','本地账号')+
    thSort('分类','分类')+
    thSort('CPU','CPU')+
    thSort('内存','内存')+
    thSort('硬盘','硬盘')+
    thSort('操作系统','操作系统')+
    thSort('备注','备注')+
    '<th>操作</th>'+
    '</tr></thead><tbody>'+
    page.map(function(r) {
      var ppBadge = (r['公用个人']==='个人')?'bg-pink':'bg-cyan';
      var pos = r['当前位置']||'';
      var deptName = r['所属部门']||'';
      var ops = '<button class="btn btn-outline btn-sm" onclick="editDevice(\''+r['序号']+'\')">\u270f\ufe0f</button>';
      if(isAdmin) ops += '<button class="btn btn-danger btn-sm" onclick="confirmDelete(\''+r['序号']+'\')">\ud83d\uddd1</button>';
      return '<tr>'+
        '<td>'+r['序号']+'</td>'+
        '<td title="'+pos+'">'+pos.substring(0,15)+(pos.length>15?'...':'')+'</td>'+
        '<td><span class="badge '+ppBadge+'">'+(r['公用个人']||'-')+'</span></td>'+
        '<td>'+(r['责任人']||'')+'</td>'+
        '<td><strong>'+(r['资产编号']||'')+'</strong></td>'+
        '<td>'+(r['用户名']||'')+'</td>'+
        '<td style="font-family:monospace;font-size:10px">'+(r['MAC地址']||'')+'</td>'+
        '<td><span class="badge '+(r['是否加域']==='是'?'bg-yes':'bg-no')+'">'+(r['是否加域']||'-')+'</span></td>'+
        '<td style="font-family:monospace">'+(r['IP地址']||'')+'</td>'+
        '<td title="'+deptName+'">'+deptName.substring(0,12)+(deptName.length>12?'...':'')+'</td>'+
        '<td>'+(r['采购日期']||'')+'</td>'+
        '<td>'+(r['使用年限']||'')+'</td>'+
        '<td>'+(r['本地账号']||'')+'</td>'+
        '<td><span class="badge '+(catBadge[r['分类']]||'bg-blue')+'">'+(r['分类']||'-')+'</span></td>'+
        '<td>'+(r['CPU']||'')+'</td>'+
        '<td>'+(r['内存']||'')+'</td>'+
        '<td>'+(r['硬盘']||'')+'</td>'+
        '<td>'+(r['操作系统']||'')+'</td>'+
        '<td style="max-width:100px;overflow:hidden;text-overflow:ellipsis" title="'+(r['备注']||'')+'">'+(r['备注']||'')+'</td>'+
        '<td>'+ops+'</td>'+
        '</tr>';
    }).join('')+
    '</tbody></table>';

  var pag = document.getElementById('pagination');
  var ph = ''; var maxB = 7;
  var s = Math.max(1, currentPage-3), e = Math.min(totalPages, s+maxB-1);
  if(e-s < maxB-1) s = Math.max(1, e-maxB+1);
  ph += '<button '+(currentPage===1?'disabled':'')+' onclick="goPage('+(currentPage-1)+')">\u25c0</button>';
  for(var i=s;i<=e;i++) ph += '<button class="'+(i===currentPage?'active':'')+'" onclick="goPage('+i+')">'+i+'</button>';
  ph += '<button '+(currentPage===totalPages?'disabled':'')+' onclick="goPage('+(currentPage+1)+')">\u25b6</button>';
  pag.innerHTML = '<div class="pagination-info">\u5171 <strong>'+total+'</strong> \u53f0\u7535\u8111\uff0c\u7b2c '+currentPage+'/'+totalPages+' \u9875</div><div class="pagination-btns">'+ph+'</div>';
}

function toggleSort(field) {
  if(sortField === field) { sortDir = -sortDir; }
  else { sortField = field; sortDir = 1; }
  currentPage = 1;
  render();
}

function goPage(p) { if(p>=1 && p<=Math.ceil(DATA.length/pageSize)){ currentPage=p; render(); } }
function reload() { currentPage=1; render(); }
function debounceSearch() { clearTimeout(searchTimer); searchTimer = setTimeout(function(){ currentPage=1; render(); }, 300); }

function filterByCard(action) {
  document.getElementById('searchInput').value = '';
  document.getElementById('filterCategory').value = '';
  document.getElementById('filterDepartment').value = '';
  document.getElementById('filterPublic').value = '';
  filterMode = (action === 'clear') ? '' : action;
  currentPage = 1;
  render();
}

function openModal(id) {
  if(!LOGIN_USER) { showToast('\u8bf7\u5148\u767b\u5f55', 'error'); return; }
  editingId = id || null;
  document.getElementById('modalTitle').textContent = id ? '\u7f16\u8f91\u7535\u8111 #'+id : '\u65b0\u589e\u7535\u8111';
  document.getElementById('editForm').reset();
  if(id) {
    var r = DATA.find(function(d){return d['\u5e8f\u53f7']===id;});
    if(r) {
      var form = document.getElementById('editForm');
      FIELDS.forEach(function(f){ var el = form.querySelector('[name="'+f+'"]'); if(el && r[f]!==undefined) el.value = r[f]; });
    }
  }
  document.getElementById('editModal').classList.add('active');
}

function editDevice(id) { openModal(id); }
function closeModal() { document.getElementById('editModal').classList.remove('active'); }

function saveDevice() {
  var form = document.getElementById('editForm');
  var fd = new FormData(form);
  var obj = {};
  FIELDS.forEach(function(f){ obj[f] = fd.get(f) || ''; });
  if(editingId) {
    var idx = DATA.findIndex(function(d){return d['\u5e8f\u53f7']===editingId;});
    if(idx >= 0) {
      var merged = {}; Object.keys(DATA[idx]).forEach(function(k){merged[k]=DATA[idx][k];}); Object.keys(obj).forEach(function(k){merged[k]=obj[k];}); merged['\u5e8f\u53f7']=editingId;
      DATA[idx] = merged;
    }
  } else {
    var maxId = Math.max.apply(null, [0].concat(DATA.map(function(d){return parseInt(d['\u5e8f\u53f7'])||0;})));
    obj['\u5e8f\u53f7'] = String(maxId + 1);
    DATA.push(obj);
  }
  closeModal();
  addOpLog(editingId ? '\u7f16\u8f91' : '\u65b0\u589e', '#'+obj['\u5e8f\u53f7'], obj['\u5206\u7c7b']+' - '+obj['\u5f53\u524d\u4f4d\u7f6e']);
  updateStats();
  render();
  showToast(editingId ? '\u7535\u8111\u66f4\u65b0\u6210\u529f' : '\u7535\u8111\u6dfb\u52a0\u6210\u529f', 'success');
}

function confirmDelete(id) {
  if(!LOGIN_USER || LOGIN_USER.role !== 'admin') { showToast('\u4ec5\u7ba1\u7406\u5458\u53ef\u5220\u9664', 'error'); return; }
  document.getElementById('confirmMsg').textContent = '\u786e\u8ba4\u5220\u9664\u5e8f\u53f7\u4e3a '+id+' \u7684\u7535\u8111\uff1f';
  document.getElementById('confirmDialog').classList.add('active');
  confirmCb = function() {
    var del = DATA.find(function(d){return d['\u5e8f\u53f7']===id;});
    DATA = DATA.filter(function(d){return d['\u5e8f\u53f7']!==id;});
    addOpLog('\u5220\u9664', '#'+id, del ? del['\u5206\u7c7b']+' - '+del['\u5f53\u524d\u4f4d\u7f6e'] : '');
    updateStats();
    render();
    showToast('\u5df2\u5220\u9664', 'success');
  };
}

function closeConfirm() { document.getElementById('confirmDialog').classList.remove('active'); confirmCb = null; }
function executeConfirm() { if(confirmCb){ confirmCb(); closeConfirm(); } }

function exportCSV() {
  var filtered = getFilteredData();
  var csv = '\uFEFF' + FIELDS.join(',') + '\n';
  filtered.forEach(function(r){
    csv += FIELDS.map(function(f){ var v = String(r[f]||''); if(v.includes(',')||v.includes('"')||v.includes('\n')) v = '"'+v.replace(/"/g,'""')+'"'; return v; }).join(',')+'\n';
  });
  var blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '\u7535\u8111\u53f0\u8d26_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  addOpLog('\u5bfc\u51fa', filtered.length+'\u6761\u8bb0\u5f55', '');
  showToast('\u5bfc\u51fa\u6210\u529f', 'success');
}

function importData(input) {
  if(!LOGIN_USER) { showToast('\u8bf7\u5148\u767b\u5f55', 'error'); return; }
  var file = input.files[0];
  if(!file) return;
  var ext = file.name.split('.').pop().toLowerCase();
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var imported;
      if(ext === 'json') { imported = JSON.parse(e.target.result); if(!Array.isArray(imported)) imported = imported.data || []; }
      else {
        var lines = e.target.result.split('\n').filter(Boolean);
        if(lines.length < 2) { showToast('\u6587\u4ef6\u683c\u5f0f\u9519\u8bef', 'error'); return; }
        var headers = lines[0].replace(/^\uFEFF/,'').split(',');
        imported = lines.slice(1).map(function(line) {
          var vals = [], inQ = false, cur = '';
          for(var ci=0;ci<line.length;ci++) { var ch=line[ci]; if(ch==='"') inQ = !inQ; else if(ch===',' && !inQ) { vals.push(cur); cur = ''; } else cur += ch; }
          vals.push(cur);
          var obj = {}; headers.forEach(function(h,i){ obj[h.trim()] = (vals[i]||'').replace(/^"|"$/g,''); });
          return obj;
        });
      }
      if(imported.length === 0) { showToast('\u672a\u8bc6\u522b\u5230\u6570\u636e', 'error'); return; }
      document.getElementById('confirmMsg').textContent = '\u786e\u8ba4\u5bfc\u5165 '+imported.length+' \u6761\u6570\u636e\uff1f';
      document.getElementById('confirmDialog').classList.add('active');
      confirmCb = function() {
        DATA = imported;
        addOpLog('\u5bfc\u5165', imported.length+'\u6761\u8bb0\u5f55', '');
        updateStats();
        updateFilters();
        render();
        showToast('\u5df2\u5bfc\u5165 '+imported.length+' \u6761', 'success');
      };
    } catch(err) { showToast('\u89e3\u6790\u5931\u8d25: '+err.message, 'error'); }
  };
  if(ext === 'json') reader.readAsText(file); else reader.readAsText(file);
  input.value = '';
}

function showToast(msg, type) {
  var el = document.createElement('div');
  el.className = 'toast '+type;
  el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(function(){ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(function(){el.remove();},300); }, 2500);
}

document.getElementById('editModal').addEventListener('click', function(e){ if(e.target===this) closeModal(); });
document.getElementById('confirmDialog').addEventListener('click', function(e){ if(e.target===this) closeConfirm(); });

</script>
